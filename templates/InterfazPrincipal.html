<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interfaz WorNex</title>
    <style>
        body {
            background: white;
            margin: 0;
            padding: 0;
        }
        .logo {
            position: absolute;
            top: 0px;
            left: 0px;
            width: 200px;
            height: auto;
        }
        .NivelTec{
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 8px;
            position: absolute;
            top: 20px;
            right: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        hr { 
            position: absolute; 
            top: 175px; 
            left: 0; 
            width: 100%; 
            border: 2px solid #00BFFF; 
        }
    </style>
</head>
<body>
    <button class="NivelTec">Nivel Técnico</button>
    <img src="/static/LogoWorNex.png" alt="Logo" class="logo">
    <hr>
</body>
</html>
